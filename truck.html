<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Truck Details</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>Truck Information</h1>
</header>

<div class="container">

<div id="details" class="details"></div>

</div>

<script src="data.js"></script>

<script>

const params=new URLSearchParams(window.location.search)

const mine=params.get("mine")

const truck=params.get("truck")

const t=mines[mine][truck]

document.getElementById("details").innerHTML=`

<h2>${t.num}</h2>

<p><b>Mine:</b> ${mine}</p>

<p><b>Model:</b> ${t.model}</p>

<p><b>Driver:</b> ${t.driver}</p>

<p><b>Status:</b> ${t.status}</p>

<p><b>Speed:</b> ${Math.floor(Math.random()*60)} km/h</p>

<p><b>Fuel:</b> ${Math.floor(Math.random()*100)}%</p>

<p><b>Last Location:</b> Pit Area ${Math.floor(Math.random()*5)}</p>

`

</script>

</body>
</html>
