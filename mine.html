<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Mine Trucks</title>

<link rel="stylesheet" href="style.css">

<link
rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>

</head>

<body>

<header>
<h1 id="mineTitle"></h1>
</header>

<div class="container">

<div id="map"></div>

<h2>Trucks</h2>

<div id="truckList" class="grid"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="data.js"></script>

<script>

const params=new URLSearchParams(window.location.search)

const mine=params.get("mine")

document.getElementById("mineTitle").innerText=mine+" Truck Monitoring"

const trucks=mines[mine]

const list=document.getElementById("truckList")

trucks.forEach((t,i)=>{

list.innerHTML+=`

<a href="truck.html?mine=${mine}&truck=${i}" class="card">

<h3>${t.num}</h3>

<p>${t.model}</p>

</a>

`

})


/* MAP */

var map=L.map('map').setView([11.6643,78.1460],13)

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

trucks.forEach((t,i)=>{

let lat=11.66+Math.random()*0.02
let lon=78.14+Math.random()*0.02

L.marker([lat,lon]).addTo(map)
.bindPopup(t.num)

})

</script>

</body>
</html>
