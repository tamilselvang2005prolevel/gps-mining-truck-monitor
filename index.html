<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mining Fleet Monitor</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>GPS based Smart Mining Truck Monitoring System</h1>
</header>

<div class="container">

<h2>Mining Sites</h2>

<div id="mineList" class="grid"></div>

</div>

<script src="data.js"></script>

<script>

const mineList=document.getElementById("mineList")

for(let mine in mines){

mineList.innerHTML+=`

<a href="mine.html?mine=${mine}" class="card">

<h3>${mine}</h3>

<p>6 Trucks</p>

</a>

`

}

</script>

</body>
</html>
